    @keyframes shimmer {

    /* ─── Line Reveal ───────────────────────────────────── */
    @keyframes lineReveal {
      from {
        transform: scaleX(0);
        transform-origin: left;
      }

        transform: scaleX(1);
        transform-origin: left;
      }
    }

    .line-reveal {

    }

    /* ─── Fade Up ───────────────────────────────────────── */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(32px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .fade-up {
